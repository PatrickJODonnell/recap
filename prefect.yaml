# Prefect deployment configuration for CI/CD
deployments:
  - name: recap
    entrypoint: agent.py:process_users
    work_pool:
      name: Recap
    schedule:
      cron: "50 5 * * 0"
      timezone: "America/New_York"
    pull:
      - prefect.deployments.steps.git_clone:
          id: clone
          repository: https://github.com/patrickodonnell/recap.git
          branch: main
          access_token: "{{ prefect.blocks.secret.github-recap-token.value }}"
      - prefect.deployments.steps.set_working_directory:
          directory: "{{ clone.directory }}"
